<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#f5f5f5;}

/* BLUR */
.locked{
  filter:blur(6px);
  pointer-events:none;
}

/* NAV */
nav{
  background:white;
  padding:15px 10%;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:30px 10%;
}

/* LEFT SECTION */
.section{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.item-left{
  display:flex;
  gap:10px;
}

.item img{
  width:60px;
  height:60px;
  border-radius:10px;
}

/* QTY */
.qty-btn{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.minus{background:#ddd;}
.plus{background:#ee4d2d;color:white;}
.remove{background:red;color:white;}

/* RIGHT SUMMARY */
.summary{
  background:white;
  padding:20px;
  border-radius:10px;
  position:sticky;
  top:20px;
  height:fit-content;
}

.summary h3{
  margin-bottom:10px;
}

.summary p{
  margin:8px 0;
}

.total{
  font-size:18px;
  font-weight:600;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

/* BUTTON */
.checkout{
  width:100%;
  padding:15px;
  background:#ee4d2d;
  color:white;
  border:none;
  border-radius:30px;
  font-weight:600;
  margin-top:15px;
}

/* LOGIN MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

/* MOBILE */
@media(max-width:768px){
  .container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="mainContent">

<nav>
  <div><b>RJEZM Checkout</b></div>
  <a href="products.html">Shop</a>
</nav>

<div class="container">

  <!-- LEFT -->
  <div>

    <!-- SHIPPING -->
    <div class="section">
      <h3>Shipping Details</h3>
      <input id="name" placeholder="Full Name">
      <input id="phone" placeholder="Phone">
      <input id="address" placeholder="Address">
    </div>

    <!-- ITEMS -->
    <div class="section">
      <h3>Order Items</h3>
      <div id="cartList"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="summary">

    <h3>Order Summary</h3>

    <p>Subtotal: <span id="subtotal"></span></p>
    <p>Shipping: ₱50</p>
    <p class="total">Total: <span id="total"></span></p>

    <button class="checkout" onclick="checkout()">Place Order</button>

  </div>

</div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="modal" style="display:none;">
  <div class="modal-box">
    <h3>Login Required</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p style="font-size:12px;margin-top:10px;">
      No account? <a href="user-signup.html">Sign up</a>
    </p>
  </div>
</div>

<script src="cart.js"></script>

<script>
// RENDER CART
function renderCart(){

  const cart = getCart();
  let subtotal = 0;

  cartList.innerHTML = "";

  cart.forEach((p,i)=>{
    const sub = p.qty * p.price;
    subtotal += sub;

    cartList.innerHTML += `
      <div class="item">
        <div class="item-left">
          <img src="${p.image}">
          <div>
            <b>${p.name}</b><br>
            ₱${p.price} x ${p.qty}
          </div>
        </div>

        <div>
          <button class="qty-btn minus" onclick="decrease(${i});renderCart()">-</button>
          <button class="qty-btn plus" onclick="increase(${i});renderCart()">+</button>
          <button class="qty-btn remove" onclick="removeItem(${i});renderCart()">✕</button>
        </div>
      </div>
    `;
  });

  subtotalEl.innerText = "₱" + subtotal;
  totalEl.innerText = "₱" + (subtotal + 50);
}

renderCart();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "craftstudio-75508.firebaseapp.com",
  projectId: "craftstudio-75508",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// LOGIN CHECK
onAuthStateChanged(auth, (user)=>{
  if(!user){
    loginModal.style.display = "flex";
    mainContent.classList.add("locked");
  } else {
    currentUser = user;
    loginModal.style.display = "none";
    mainContent.classList.remove("locked");
  }
});

// LOGIN
window.login = async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch{
    alert("Login failed");
  }
};

// CHECKOUT
let isProcessing = false;

window.checkout = async()=>{

  if(!currentUser){
    alert("Login first");
    return;
  }

  if(isProcessing) return;
  isProcessing = true;

  const btn = document.querySelector(".checkout");
  btn.innerText = "Processing...";
  btn.disabled = true;

  try{

    const cart = getCart();

    if(cart.length === 0){
      alert("Cart empty");
      throw "";
    }

    const subtotal = cart.reduce((t,p)=>t+p.qty*p.price,0);
    const total = subtotal + 50;

    await addDoc(collection(db,"orders"),{
      userId: currentUser.uid,
      items: cart,
      total,
      status:"pending"
    });

    alert("Order placed!");
    localStorage.removeItem("cart");
    location.reload();

  }catch{}

  isProcessing = false;
  btn.innerText = "Place Order";
  btn.disabled = false;
};
</script>

</body>
</html>
