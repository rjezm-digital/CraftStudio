<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  display:flex;
  background:#f4f6fb;
}

/* LOGIN */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:999;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:320px;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  background:#111;
  color:white;
  padding:25px;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* TABLE */
.table{
  width:100%;
  background:white;
  border-radius:15px;
  overflow:hidden;
  margin-top:10px;
}

.table th{
  background:#f3f4f6;
  padding:12px;
}

.table td{
  padding:12px;
  border-top:1px solid #eee;
}

.table img{
  width:50px;
  height:50px;
  border-radius:10px;
}

/* MODAL */
.modal2{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
}

.modal-box2{
  background:white;
  padding:25px;
  border-radius:20px;
  width:350px;
}

.modal-box2 input,
.modal-box2 textarea,
.modal-box2 select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

.order-item{
  border-bottom:1px solid #eee;
  padding:5px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>RJEZM</h2>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Products</h2>
  <button class="btn" onclick="addModal.style.display='flex'">+ Add</button>
</div>

<table class="table">
<thead>
<tr>
<th>Image</th><th>Name</th><th>Desc</th><th>Price</th><th>Stock</th><th>Type</th><th>Action</th>
</tr>
</thead>
<tbody id="productTable"></tbody>
</table>

<h2 style="margin-top:30px;">Orders</h2>

<table class="table">
<thead>
<tr>
<th>Customer</th><th>Total</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

</div>

<!-- ADD PRODUCT -->
<div id="addModal" class="modal2">
  <div class="modal-box2">
    <h3>Add Product</h3>
    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <input id="stock" placeholder="Stock">
    <textarea id="desc" placeholder="Description"></textarea>
    <select id="type">
      <option value="digital">Digital</option>
      <option value="physical">On-Hand</option>
    </select>
    <input id="download" placeholder="Download link">
    <input type="file" id="imageFile">
    <button onclick="addProduct()">Save Product</button>
  </div>
</div>

<!-- ORDER DETAILS -->
<div id="orderModal" class="modal2">
  <div class="modal-box2">
    <h3>Order Details</h3>
    <div id="orderDetails"></div>
    <button onclick="orderModal.style.display='none'">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSyC4WQfNT3x6MFRftIlKPlfLcYMoY4juIhM",
  authDomain:"craftstudio-75508.firebaseapp.com",
  projectId:"craftstudio-75508",
  storageBucket:"craftstudio-75508.appspot.com",
  messagingSenderId:"989141876605",
  appId:"1:989141876605:web:f36254dd915f2c84219614"
});

const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    loginModal.style.display="flex";
    return;
  }

  const admin = await getDoc(doc(db,"admins",user.uid));
  if(!admin.exists()){
    alert("Not admin");
    location.href="index.html";
    return;
  }

  loginModal.style.display="none";
  loadProducts();
  loadOrders();
});

/* LOGIN */
window.login = async()=>{
  try{

    // 👉 THIS IS THE KEY
    await setPersistence(auth, browserSessionPersistence);

    await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );

  }catch(err){
    alert("Login failed: " + err.message);
  }
};

/* LOGOUT */
window.logout = async()=>{
  await signOut(auth);
  location.reload();
};

/* ADD PRODUCT */
window.addProduct = async()=>{
  try{
    const file = imageFile.files[0];
    if(!file) return alert("Upload image");

    const refS = ref(storage,"products/"+Date.now());
    await uploadBytes(refS,file);
    const url = await getDownloadURL(refS);

    await addDoc(collection(db,"products"),{
      name:name.value,
      price:+price.value,
      stock:+stock.value,
      desc:desc.value || "",
      type:type.value,
      download:download.value || "",
      image:url
    });

    alert("Saved!");
    location.reload();

  }catch(err){
    alert("Error saving");
  }
};

/* PRODUCTS */
async function loadProducts(){
  productTable.innerHTML="";
  const data = await getDocs(collection(db,"products"));

  data.forEach(d=>{
    const p=d.data();

    productTable.innerHTML+=`
    <tr>
      <td><img src="${p.image}"></td>
      <td>${p.name}</td>
      <td>${p.desc || "-"}</td>
      <td>₱${p.price}</td>
      <td>${p.stock ?? 0}</td>
      <td>${p.type}</td>
      <td><button onclick="del('${d.id}')">Delete</button></td>
    </tr>`;
  });
}

/* ORDERS */
async function loadOrders(){
  orderTable.innerHTML="";
  const data = await getDocs(collection(db,"orders"));

  data.forEach(d=>{
    const o=d.data();

    orderTable.innerHTML+=`
    <tr onclick='viewOrder(${JSON.stringify(o)})'>
      <td>${o.customer?.name || "N/A"}</td>
      <td>₱${o.total}</td>
      <td>${o.status}</td>
      <td>
        <button onclick="event.stopPropagation();done('${d.id}')">Done</button>
        <button onclick="event.stopPropagation();delOrder('${d.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

/* VIEW */
window.viewOrder = (o)=>{
  let html="";
  o.items?.forEach(i=>{
    html+=`<div class="order-item">${i.name} x${i.qty}</div>`;
  });
  orderDetails.innerHTML=html;
  orderModal.style.display="flex";
};

/* DONE */
window.done = async(id)=>{
  await updateDoc(doc(db,"orders",id),{status:"completed"});
  location.reload();
};

/* DELETE */
window.del = async(id)=>{
  await deleteDoc(doc(db,"products",id));
  loadProducts();
};

window.delOrder = async(id)=>{
  await deleteDoc(doc(db,"orders",id));
  loadOrders();
};
</script>

</body>
</html>
