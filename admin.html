<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{display:flex;background:#f8f9fb;}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:25px;
  border-right:1px solid #eee;
}

/* MAIN */
.main{flex:1;padding:30px;}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.btn{
  padding:10px 18px;
  background:#111;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* TABLE */
.table{
  width:100%;
  background:white;
  border-radius:15px;
  overflow:hidden;
  margin-top:10px;
}

.table th,.table td{
  padding:12px;
  border-bottom:1px solid #eee;
}

.table img{
  width:50px;
  border-radius:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:320px;
}

/* ORDER ITEMS */
.order-item{
  border-bottom:1px solid #eee;
  padding:6px 0;
  font-size:13px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>RJEZM</h2>
  <p>Dashboard</p>
</div>

<div class="main">

<div class="header">
  <h2>Products</h2>
  <button class="btn" onclick="openAdd()">+ Add</button>
</div>

<table class="table">
<thead>
<tr>
<th>Image</th>
<th>Name</th>
<th>Desc</th>
<th>Price</th>
<th>Stock</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>
<tbody id="productTable"></tbody>
</table>

<h2 style="margin-top:30px;">Orders</h2>

<table class="table">
<thead>
<tr>
<th>Customer</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

</div>

<!-- ADD -->
<div id="addModal" class="modal">
<div class="modal-box">
<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<textarea id="desc" placeholder="Description"></textarea>
<select id="type">
<option value="digital">Digital</option>
<option value="physical">On-Hand</option>
</select>
<input id="download" placeholder="Download Link (digital)">
<input type="file" id="imageFile">
<button class="btn" onclick="addProduct()">Save</button>
</div>
</div>

<!-- ORDER MODAL -->
<div id="orderModal" class="modal">
<div class="modal-box" style="width:400px;">
<h3>Order Details</h3>
<div id="orderDetails"></div>
<button class="btn" onclick="orderModal.style.display='none'">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSy...",
projectId:"craftstudio-75508"
});

const db = getFirestore(app);
const storage = getStorage(app);

/* ADD */
window.openAdd=()=>addModal.style.display="flex";

window.addProduct=async()=>{
const file=imageFile.files[0];
const refS=ref(storage,"products/"+Date.now());
await uploadBytes(refS,file);
const url=await getDownloadURL(refS);

await addDoc(collection(db,"products"),{
name:name.value,
price:+price.value,
stock:+stock.value,
desc:desc.value,
type:type.value,
download:download.value,
image:url
});

location.reload();
};

/* PRODUCTS */
async function loadProducts(){
productTable.innerHTML="";
const data=await getDocs(collection(db,"products"));

data.forEach(d=>{
const p=d.data();

productTable.innerHTML+=`
<tr>
<td><img src="${p.image}"></td>
<td>${p.name}</td>
<td>${p.desc}</td>
<td>₱${p.price}</td>
<td>${p.stock}</td>
<td>${p.type}</td>
<td>
<button onclick="del('${d.id}')">Delete</button>
</td>
</tr>`;
});
}

/* ORDERS */
async function loadOrders(){
orderTable.innerHTML="";
const data=await getDocs(collection(db,"orders"));

data.forEach(d=>{
const o=d.data();

let items="";
o.items?.forEach(i=>{
items+=`${i.name} x${i.qty}<br>`;
});

orderTable.innerHTML+=`
<tr onclick='viewOrder(${JSON.stringify(o)})'>
<td>${o.customer?.name||"N/A"}</td>
<td>${items}</td>
<td>₱${o.total}</td>
<td>${o.status}</td>
<td>
<button onclick="event.stopPropagation();done('${d.id}')">Done</button>
<button onclick="event.stopPropagation();delOrder('${d.id}')">Delete</button>
</td>
</tr>`;
});
}

/* VIEW */
window.viewOrder=(o)=>{
let html="";

html+=`<b>${o.customer?.name||""}</b><br>`;

o.items?.forEach(i=>{
html+=`<div class="order-item">${i.name} x${i.qty}</div>`;
});

if(o.downloads){
html+="<h4>Downloads</h4>";
o.downloads.forEach(d=>{
html+=`<a href="${d.link}" target="_blank">${d.name}</a><br>`;
});
}

orderDetails.innerHTML=html;
orderModal.style.display="flex";
};

/* DONE (AUTO DIGITAL) */
window.done=async(id)=>{
const refO=doc(db,"orders",id);
const snap=await getDoc(refO);
const order=snap.data();

const prods=await getDocs(collection(db,"products"));

let downloads=[];

prods.forEach(p=>{
const data=p.data();
const match=order.items.find(i=>i.name===data.name);

if(match && data.type==="digital"){
downloads.push({name:data.name,link:data.download});
}
});

await updateDoc(refO,{
status:"completed",
downloads
});

alert("Done + delivered!");
location.reload();
};

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"products",id));
location.reload();
};

window.delOrder=async(id)=>{
await deleteDoc(doc(db,"orders",id));
location.reload();
};

loadProducts();
loadOrders();
</script>

</body>
</html>
