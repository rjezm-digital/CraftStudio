<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{display:flex;background:#f5f6fa;}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111;
  color:white;
  padding:20px;
}

.sidebar a{display:block;color:#ccc;margin:15px 0;text-decoration:none;}
.sidebar a:hover{color:white;}

/* MAIN */
.main{flex:1;padding:20px;}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

button{
  padding:10px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
}

/* TABLE */
.table{width:100%;background:white;border-radius:10px;overflow:hidden;}
.table th,.table td{padding:12px;}
.table th{background:#eee;}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>RJEZM</h2>
  <a>Dashboard</a>
</div>

<div class="main">

  <div class="header">
    <h2>Products</h2>
    <div>
      <button onclick="openModal()">+ Add</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="productList"></tbody>
  </table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Add Product</h3>
    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <select id="type">
      <option value="digital">Digital</option>
      <option value="physical">On-Hand</option>
    </select>
    <input id="image" placeholder="images/sample.jpg">
    <button onclick="addProduct()">Save</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4WQfNT3x6MFRftIlKPlfLcYMoY4juIhM",
  authDomain: "craftstudio-75508.firebaseapp.com",
  projectId: "craftstudio-75508",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔒 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
});

// MODAL
function openModal(){
  document.getElementById("modal").style.display="flex";
}
window.openModal = openModal;

// ADD PRODUCT
async function addProduct(){
  const name = nameInput.value;
  const price = priceInput.value;
  const type = typeInput.value;
  const image = imageInput.value;

  await addDoc(collection(db,"products"),{name,price,type,image});
  alert("Saved!");
  location.reload();
}
window.addProduct = addProduct;

// LOGOUT
function logout(){
  signOut(auth);
  window.location.href="login.html";
}
window.logout = logout;

// LOAD PRODUCTS
async function loadProducts(){
  const list = document.getElementById("productList");
  const querySnapshot = await getDocs(collection(db,"products"));

  querySnapshot.forEach(doc=>{
    const p = doc.data();
    list.innerHTML += `
      <tr>
        <td><img src="${p.image}" width="50"></td>
        <td>${p.name}</td>
        <td>₱${p.price}</td>
        <td>${p.type}</td>
      </tr>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
