<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  font-family:Poppins;
  padding:20px;
  background:#f4f4f4;
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

.card{
  background:white;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📦 Add Product</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price (₱)">
<select id="type">
  <option value="digital">Digital</option>
  <option value="physical">On-Hand</option>
</select>
<input type="text" id="image" placeholder="Image path (images/sample.jpg)">

<button onclick="addProduct()">Add Product</button>

<h3>Saved Products</h3>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC4WQfNT3x6MFRftIlKPlfLcYMoY4juIhM",
  authDomain: "craftstudio-75508.firebaseapp.com",
  projectId: "craftstudio-75508",
  storageBucket: "craftstudio-75508.firebasestorage.app",
  messagingSenderId: "989141876605",
  appId: "1:989141876605:web:f36254dd915f2c84219614"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ ADD PRODUCT
async function addProduct(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const type = document.getElementById("type").value;
  const image = document.getElementById("image").value;

  if(!name || !price || !image){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "products"), {
    name, price, type, image
  });

  alert("✅ Product saved!");
  loadProducts();
}

// 📦 LOAD PRODUCTS
async function loadProducts(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "products"));

  querySnapshot.forEach((doc) => {
    const p = doc.data();

    list.innerHTML += `
      <div class="card">
        <b>${p.name}</b><br>
        ₱${p.price}<br>
        <img src="${p.image}" width="100">
      </div>
    `;
  });
}

window.addProduct = addProduct;
loadProducts();
</script>

</body>
</html>
